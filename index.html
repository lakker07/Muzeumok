<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Múzeum Térkép - Diagnosztika</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; }
        #map { height: calc(100vh - 64px); width: 100%; z-index: 1; }
        .panel-anim { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-slate-900 text-white px-4 flex justify-between items-center h-16 shadow-lg relative z-50">
        <h1 class="text-base font-bold">🌍 Múzeum Térkép</h1>
        <button onclick="document.getElementById('debugModal').classList.remove('hidden')" class="bg-amber-600 px-3 py-1.5 rounded text-xs font-semibold">🛠️ Adatok ellenőrzése</button>
    </header>

    <div id="debugModal" class="fixed inset-0 bg-black/70 z-[3000] flex justify-center items-center p-4 hidden">
        <div class="bg-white rounded-2xl w-full max-w-2xl max-h-[80vh] flex flex-col p-5 shadow-2xl">
            <div class="flex justify-between items-center border-b pb-2 mb-3">
                <h2 class="font-bold text-gray-800 text-base">Google Táblázat Beolvasási Ellenőrzés</h2>
                <button onclick="document.getElementById('debugModal').classList.add('hidden')" class="text-gray-500 font-bold text-xl">&times;</button>
            </div>
            <div class="overflow-y-auto flex-1 text-xs font-mono space-y-4" id="debugContent">
                <p class="text-gray-500">Adatok betöltése folyamatban...</p>
            </div>
        </div>
    </div>

    <div class="relative w-full h-full flex flex-col">
        <div id="loader" class="absolute inset-0 bg-slate-900/80 z-[2000] flex flex-col justify-center items-center text-white font-bold text-sm gap-3">
            <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            Adatok letöltése...
        </div>
        <div id="map"></div>
        <div id="infoPanel" class="absolute bottom-0 left-0 right-0 z-[1001] bg-white rounded-t-2xl shadow-2xl p-5 border-t border-gray-200 panel-anim translate-y-full max-h-[75vh] overflow-y-auto hidden">
            <div class="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-4 cursor-pointer" onclick="closeInfoPanel()"></div>
            <div id="infoContent" class="max-w-2xl mx-auto"></div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1sl8sEfmq8-mho1tKeMzzG0tCuGb_RQySNIk3NbMY2Qw';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&t=${new Date().getTime()}`;

        let muzeumok = [];
        let markers = [];

        const map = L.map('map', { zoomControl: false }).setView([47.5, 13.5], 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function parseCSV(text) {
            let lines = []; let row = [""]; let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i]; let next = text[i+1];
                if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else { inQuotes = !inQuotes; } }
                else if (c === ',' && !inQuotes) { row.push(""); }
                else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') { i++; } lines.push(row); row = [""]; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== "") lines.push(row);
            return lines;
        }

        async function loadDataFromSheet() {
            const debug = document.getElementById("debugContent");
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const parsedLines = parseCSV(csvText);
                
                if (parsedLines.length < 2) {
                    debug.innerHTML = "<span class='text-red-500'>❌ A táblázat üres vagy nem olvasható!</span>";
                    return;
                }
                
                const rawHeaders = parsedLines[0];
                const headers = rawHeaders.map(h => h.trim().toLowerCase());
                
                // Első sor (Sinsheim) adatainak kimentése diagnosztikára
                let firstRowData = parsedLines[1];
                let debugHTML = `
                    <div class="p-3 bg-blue-50 rounded border border-blue-200">
                        <strong class="text-blue-800">1. Amit a Google-től kapunk (Oszlop nevek):</strong><br>
                        ${rawHeaders.map((h, i) => `[${i}. oszlop]: "${h}"`).join('<br>')}
                    </div>
                    <div class="p-3 bg-green-50 rounded border border-green-200">
                        <strong class="text-green-800">2. Az első múzeum (Sinsheim) nyers értékei:</strong><br>
                        ${firstRowData.map((val, i) => `Oszlop [${rawHeaders[i]}]: "${val}"`).join('<br>')}
                    </div>
                `;
                
                muzeumok = parsedLines.slice(1).map(row => {
                    let obj = {};
                    headers.forEach((header, index) => {
                        let key = header;
                        if (header === 'fokat') key = 'foKat';
                        if (header === 'alkat') key = 'alKat';
                        obj[key] = row[index] ? row[index].trim() : "";
                    });
                    obj.id = parseInt(obj.id || obj.ID);
                    obj.lat = parseFloat(obj.lat || obj.Lat);
                    obj.lng = parseFloat(obj.lng || obj.Lng);
                    return obj;
                }).filter(m => !isNaN(m.lat) && !isNaN(m.lng));

                // Értelmezett objektum bemutatása a diagnosztikában
                if (muzeumok.length > 0) {
                    debugHTML += `
                        <div class="p-3 bg-purple-50 rounded border border-purple-200">
                            <strong class="text-purple-800">3. Hogyan értelmezi a program a Sinsheim-et:</strong><br>
                            <pre class="bg-white p-2 rounded mt-1 border">${JSON.stringify(muzeumok[0], null, 2)}</pre>
                        </div>
                    `;
                }
                
                debug.innerHTML = debugHTML;

                // Térkép kirajzolása
                muzeumok.forEach(m => {
                    const marker = L.marker([m.lat, m.lng]).addTo(map);
                    marker.on('click', () => showInfo(m));
                    markers.push(marker);
                });
                
                document.getElementById("loader").classList.add("hidden");
            } catch (error) {
                debug.innerHTML = `<span class='text-red-500'>❌ Hiba történt: ${error.message}</span>`;
            }
        }

        function showInfo(m) {
            const panel = document.getElementById("infoPanel");
            const content = document.getElementById("infoContent");
            
            // Megnézzük, mik jöttek létre az objektumban
            const websiteLink = m.link || m.weboldal || m.url;
            const rawImages = m.kep || m.kepek || m.image;

            let imagesHTML = '';
            if (rawImages) {
                const imageArray = rawImages.split(',').map(img => img.trim()).filter(img => img.startsWith('http'));
                imageArray.forEach(imgUrl => {
                    imagesHTML += `<img src="${imgUrl}" class="w-full h-48 object-cover rounded-xl mb-3 shadow-md" onerror="this.style.display='none'">`;
                });
            }

            content.innerHTML = `
                <h3 class="text-xl font-bold text-slate-800 mb-1">${m.nev || 'Névtelen'}</h3>
                <p class="text-xs text-gray-400 font-bold uppercase mb-3">${m.varos || ''}, ${m.orszag || ''}</p>
                <p class="text-sm text-gray-600 mb-4">${m.leiras || ''}</p>
                <div class="space-y-3 mb-4">${imagesHTML}</div>
                ${websiteLink ? `<a href="${websiteLink}" target="_blank" class="block w-full text-center bg-blue-600 text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider shadow-md">Hivatalos Weboldal Megnyitása 🔗</a>` : '<p class="text-xs text-red-500 text-center bg-red-50 p-2 rounded border border-red-200">A program szerint a link mező üres vagy érvénytelen!</p>'}
            `;

            panel.classList.remove("hidden");
            setTimeout(() => panel.classList.remove("translate-y-full"), 50);
        }

        function closeInfoPanel() {
            const panel = document.getElementById("infoPanel");
            panel.classList.add("translate-y-full");
            setTimeout(() => panel.classList.add("hidden"), 300);
        }

        loadDataFromSheet();
    </script>
</body>
</html>
